# Source of truth: nwarila-platform/talos-cluster/PLAN.md
# Inherits golden baseline rulesets from the framework. Only required_status_checks is
# overridden to gate on terraform-static-ci.
#
# Environment protections: this repo is PUBLIC, so every protection knob
# below (`can_admins_bypass: false`, required reviewers, `wait_timer: 15`)
# is honoured by GitHub Free. Any fork of this YAML to a PRIVATE repo on
# Free would silently lose those — see github-terraform-framework
# DESIGN.md §16.7 for the silent-fallback matrix.

talos-cluster:
  description: "Talos Linux bare-metal Kubernetes platform (6x Intel NUCs, 3 CP + 3 workers). Core services: Cilium, cert-manager, external-dns, Vault, ESO, ArgoCD, Longhorn, cloudflared."
  homepage_url: "https://nickwarila.com"
  visibility: "public"

  topics:
    - talos
    - kubernetes
    - gitops
    - argocd
    - cilium
    - vault
    - homelab
    - platform-engineering
    - infrastructure-as-code

  actions:
    enabled: true
    allowed_actions: selected
    allowed_actions_config:
      github_owned_allowed: true
      verified_allowed: true
      patterns_allowed:
        - "hashicorp/setup-terraform@*"
        - "aws-actions/configure-aws-credentials@*"
        - "rhysd/actionlint@*"
        - "terraform-linters/setup-tflint@*"

  environments:
    bootstrap-plan:
      wait_timer: 0
      can_admins_bypass: false
      prevent_self_review: false
      deployment_branch_policy:
        protected_branches: true
        custom_branch_policies: false

    bootstrap:
      wait_timer: 0
      can_admins_bypass: false
      prevent_self_review: false
      reviewers:
        users:
          - 33955773
      deployment_branch_policy:
        protected_branches: true
        custom_branch_policies: false

    bootstrap-destroy:
      wait_timer: 15
      can_admins_bypass: false
      prevent_self_review: false
      reviewers:
        users:
          - 33955773
      deployment_branch_policy:
        protected_branches: true
        custom_branch_policies: false

    platform-apply:
      wait_timer: 0
      can_admins_bypass: false
      prevent_self_review: false
      deployment_branch_policy:
        protected_branches: true
        custom_branch_policies: false
